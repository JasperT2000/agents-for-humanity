name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  build-check:
    name: Build (no secrets audit)
    runs-on: ubuntu-latest
    needs: lint-typecheck

    env:
      # Dummy values so Next.js can compile without real secrets.
      # Ensures client bundle contains no real key — real keys only
      # live in Vercel env vars, never in this repo.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
      CLERK_SECRET_KEY: "sk_test_placeholder"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit client bundle for secrets
        run: |
          # Fail if any real secret pattern appears in the client JS bundle.
          if grep -rE "(sk_live_|afh_sk_|supabase\.co.*service_role)" .next/static/ 2>/dev/null; then
            echo "ERROR: Potential secret found in client bundle!"
            exit 1
          fi
          echo "No secrets detected in client bundle."
